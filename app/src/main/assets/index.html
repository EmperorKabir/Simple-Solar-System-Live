<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Live Solar Astronomy</title>
    <style>
        body { margin: 0; background-color: #020202; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        #ui-container { position: absolute; z-index: 10; width: 100%; top: 0; pointer-events: none; }
        #hud-telemetry { padding: 15px 20px; float: right; color: white; user-select: none; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 4px #000; text-transform: uppercase; font-size: 12px; text-align: right; display: none; }
        .hud-btn { pointer-events: auto; margin-left: 20px; padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer; border-radius: 4px; backdrop-filter: blur(4px); font-weight: bold; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top:0; z-index: 1;}
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }
        .btn-glass:active { background: rgba(255, 255, 255, 0.4); }
        
        #header-layer {
            position: absolute;
            top: 40px;
            left: 20px;
            pointer-events: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #status {
            color: white;
            font-size: 26px;
            font-weight: 300;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #sub-status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #bottom-layer {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        .planet-label {
            color: rgba(255, 255, 255, 0.9);
            font-family: sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: auto;
            cursor: pointer;
            margin-top: -20px; 
            transition: opacity 0.5s;
            text-shadow: 0 2px 4px rgba(0,0,0,1.0);
        }
        .hidden-label {
            opacity: 0 !important;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./js/three.module.js",
          "three/addons/": "./js/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="hud-telemetry" style="display:none; text-align: right; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 5px; font-family: monospace; border: 1px solid rgba(255,255,255,0.2);">ORBIT: -- DAYS<br>DAY: -- HOURS</div>
        <div style="clear: both; margin-bottom: 10px;"></div>
    </div>

    <div id="header-layer">
        <h1 id="status">Solar System</h1>
        <div id="sub-status">Live Positions</div>
        <div style="display:flex; flex-direction:column; gap:5px; margin-top:5px;">
            <button id="pluto-toggle" class="btn-glass" style="max-width: 140px; text-align: center;">Hide Pluto</button>
            <button id="reset-btn" class="btn-glass" style="max-width: 140px; text-align: center;">Reset View</button>
            <select id="nav-dropdown" class="btn-glass" style="max-width: 140px; font-family: sans-serif; font-size: 13px; color: white; background: rgba(0,0,0,0.6); outline: none;">
                <option value="none" disabled selected>Jump to Body...</option>
            </select>
        </div>
    </div>
    


    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/CSS2DRenderer.js';

        // ============================================================
        // Offline Orbital Mechanics Modules (Stages 6–8)
        // All dynamic position requests are routed through these local
        // classes. No network calls — pure offline computation.
        // ============================================================
        import { dateToJulianDate, julianDateToJ2000Days, getCurrentJ2000Days, getGMST, getSunRA } from './js/OrbitalTimeUtils.js';
        import { eclipticToScene, normalizeToVisualDistance, eclipticToVisualScene } from './js/CoordinateTransformer.js';
        import { computePlanetPosition, computeMoonPosition, computeBodyRotation, computeSunRotation } from './js/OrbitalEngine.js';

        // ============================================================
        // 1. Core WebGL Engine Setup
        // ============================================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        // Initial position will be set by calcResetView() after planets are created

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        labelRenderer.domElement.style.zIndex = '5';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = false;
        controls.maxDistance = 750.0;
        controls.minDistance = 1.0;
        controls.touches = { ONE: THREE.TOUCH.PAN, TWO: THREE.TOUCH.DOLLY_ROTATE };
        controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
        
        // ============================================================
        // 2. Lighting — Point light at Sun + ambient + hemisphere fill
        // ============================================================
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 0.6));
        const sunLight = new THREE.PointLight(0xffffff, 3.0, 0, 0);
        sunLight.position.set(0, 0, 0); 
        scene.add(sunLight);

        // ============================================================
        // 3. Astronomical Data — J2000 Keplerian Elements
        // @DEPRECATED — Will be replaced by OrbitalEngine periodic series data (Sub-Agents 1A-1E, 2)
        // ============================================================
        // All orbital elements are J2000.0 epoch (JD 2451545.0)
        // a = semi-major axis (AU), e = eccentricity, i = inclination (deg)
        // L = mean longitude (deg), w = longitude of perihelion (deg)
        // node = longitude of ascending node (deg), n = mean motion (deg/day)
        //
        // Rotation parameters from IAU WGCCRE 2015 (Archinal et al. 2018):
        // W0 = prime meridian angle at J2000 (deg), Wd = rotation rate (deg/day)
        // obliquity = axial tilt to ecliptic (deg)
        // poleLon = ecliptic longitude of north pole projection (deg)
        //
        // texOffset: empirical correction (deg) to align the texture's 0° longitude
        //   with the IAU prime meridian, accounting for how the specific texture
        //   image was authored (some textures have the PM at image center, others offset).
        //   Three.js SphereGeometry maps U=0.5 (texture center) to the +X axis.
        
        const rawPlanetsData = {
            Mercury: { order: 1, a: 0.3871, e: 0.2056, i: 7.00, L: 252.25, w: 77.45, node: 48.33, n: 4.0923344, period: 0.240846, size: 0.35,
                rotPeriod: 58.6, obliquity: 0.034, W0: 329.5469, Wd: 6.1385025, poleLon: 281.01, texOffset: 0.0 },
            Venus: { order: 2, a: 0.7233, e: 0.0067, i: 3.39, L: 181.97, w: 131.53, node: 76.68, n: 1.6021302, period: 0.615197, size: 0.55,
                rotPeriod: -243.0, obliquity: 177.36, W0: 160.20, Wd: -1.4813688, poleLon: 272.76, texOffset: 0.0 },
            Earth: { order: 3, a: 1.0000, e: 0.0167, i: 0.00, L: 100.46, w: 102.94, node: 0.00, n: 0.9856091, period: 1.000017, size: 0.7,
                rotPeriod: 1.0, obliquity: 23.44, W0: 0, Wd: 0, poleLon: 0.0, texOffset: 0.0,
                useGMST: true },
            Mars: { order: 4, a: 1.5237, e: 0.0934, i: 1.85, L: -4.55, w: -23.94, node: 49.57, n: 0.5240330, period: 1.880847, size: 0.45,
                rotPeriod: 1.03, obliquity: 25.19, W0: 176.630, Wd: 350.89198226, poleLon: 352.9, texOffset: 0.0 },
            Jupiter: { order: 5, a: 5.2044, e: 0.0489, i: 1.30, L: 34.40, w: 14.75, node: 100.55, n: 0.0830853, period: 11.862615, size: 1.6,
                rotPeriod: 0.41, obliquity: 3.13, W0: 284.95, Wd: 870.5366420, poleLon: 268.06, texOffset: 0.0 },
            Saturn: { order: 6, a: 9.5826, e: 0.0565, i: 2.48, L: 49.94, w: 92.43, node: 113.71, n: 0.0334442, period: 29.447498, size: 1.4,
                rotPeriod: 0.45, obliquity: 26.73, W0: 38.90, Wd: 810.7939024, poleLon: 40.59, texOffset: 0.0 },
            Uranus: { order: 7, a: 19.201, e: 0.0463, i: 0.77, L: 313.23, w: 170.96, node: 74.22, n: 0.0117258, period: 84.016846, size: 1.1,
                rotPeriod: -0.72, obliquity: 97.77, W0: 203.81, Wd: -501.1600928, poleLon: 257.31, texOffset: 0.0 },
            Neptune: { order: 8, a: 30.047, e: 0.0085, i: 1.76, L: -55.12, w: 44.97, node: 131.72, n: 0.0059810, period: 164.79132, size: 1.05,
                rotPeriod: 0.67, obliquity: 28.32, W0: 253.18, Wd: 536.3128492, poleLon: 299.36, texOffset: 0.0 },
            Pluto: { order: 9, a: 39.482, e: 0.2488, i: 17.16, L: 238.92, w: 224.06, node: 110.30, n: 0.0039640, period: 247.92065, size: 0.25,
                rotPeriod: -6.39, obliquity: 122.53, W0: 302.695, Wd: -56.3623195, poleLon: 227.34, texOffset: 0.0 }
        };

        // ============================================================
        // 3A. Visual Scale Engine — Proportional Scaling from Real Data
        // ============================================================
        // Computes all visual sizes and distances from real physical data
        // using power-law compression. No network requests — all data is
        // embedded from NASA/IAU reference tables.
        //
        // Design goals:
        //   1. Preserve RELATIVE proportions (Jupiter > Saturn > Earth > Mars)
        //   2. Compress the enormous real-world dynamic range into a viewable scene
        //   3. Keep inner planets visibly separated, outer planets appropriately spaced
        //   4. Make moons visible and spaced within each planet system
        //
        // Approach: power-law mapping:  visual = k * (real / ref)^exponent
        //   - Lower exponent = more compression (good for distances spanning 0.39–39 AU)
        //   - Higher exponent = more faithful (good for body sizes spanning 1–11 Earth radii)
        
        const VisualScaleEngine = (() => {
            // ── Real Physical Data (km) ──────────────────────────────────
            // Source: NASA Planetary Fact Sheet (2024), no network needed
            
            // Mean equatorial radii (km)
            const REAL_RADII = {
                Sun:      695700,
                Mercury:    2439.7,
                Venus:      6051.8,
                Earth:      6371.0,
                Mars:       3389.5,
                Jupiter:   69911,
                Saturn:    58232,
                Uranus:    25362,
                Neptune:   24622,
                Pluto:      1188.3
            };
            
            // Semi-major axes (AU) — from rawPlanetsData.a field
            const REAL_AU = {
                Mercury: 0.3871,
                Venus:   0.7233,
                Earth:   1.0000,
                Mars:    1.5237,
                Jupiter: 5.2044,
                Saturn:  9.5826,
                Uranus:  19.201,
                Neptune: 30.047,
                Pluto:   39.482
            };
            
            // Moon semi-major axes (km) from host planet center
            const REAL_MOON_SMA = {
                // Earth
                Moon:      384400,
                // Mars
                Phobos:    9376,
                Deimos:    23460,
                // Jupiter (Galilean)
                Io:        421800,
                Europa:    671100,
                Ganymede:  1070400,
                Callisto:  1882700,
                // Saturn
                Mimas:     185540,
                Enceladus: 238040,
                Tethys:    294670,
                Dione:     377420,
                Rhea:      527070,
                Titan:     1221870,
                Iapetus:   3560840,
                // Uranus
                Miranda:   129900,
                Ariel:     190900,
                Umbriel:   266000,
                Titania:   436300,
                Oberon:    583500,
                // Neptune
                Proteus:   117647,
                Triton:    354759,
                // Pluto
                Charon:    19591,
                Styx:      42656,
                Nix:       48694,
                Kerberos:  57783,
                Hydra:     64738
            };
            
            // Mean radii of moons (km)
            const REAL_MOON_RADII = {
                Moon:      1737.4,
                Phobos:    11.1,
                Deimos:    6.2,
                Io:        1821.6,
                Europa:    1560.8,
                Ganymede:  2631.2,
                Callisto:  2410.3,
                Mimas:     198.2,
                Enceladus: 252.1,
                Tethys:    533.0,
                Dione:     561.4,
                Rhea:      763.5,
                Titan:     2574.7,
                Iapetus:   734.5,
                Miranda:   235.8,
                Ariel:     578.9,
                Umbriel:   584.7,
                Titania:   788.9,
                Oberon:    761.4,
                Proteus:   210,
                Triton:    1353.4,
                Charon:    606,
                Styx:      5.2,
                Nix:       24.9,
                Kerberos:  9.5,
                Hydra:     25.45
            };
            
            // ── Scaling Parameters ───────────────────────────────────────
            // Tuned for a stylized but proportionally-correct visual scene
            
            const DIST_EXPONENT   = 0.55;   // distance compression (0.5 = sqrt-like)
            const DIST_SCALE      = 8.0;    // base multiplier for orbital distances
            const DIST_REF_AU     = 1.0;    // reference distance (Earth = 1 AU)
            
            const RADIUS_EXPONENT = 0.45;   // body radius compression
            const RADIUS_SCALE    = 0.70;   // base multiplier for body radii
            const RADIUS_REF_KM   = REAL_RADII.Earth; // reference radius
            
            const SUN_VISUAL_RADIUS = 2.5;  // Sun kept at fixed scenic size (not proportional)
            
            // Per-system moon distance config:
            //   baseInner = scene-unit distance of the innermost moon
            //   Remaining moons scale by real SMA ratio from the innermost
            //   maxOuter  = cap to prevent distant moons from overflowing
            const MOON_DIST_CONFIG = {
                Earth:   { baseInner: 2.0,  maxOuter: 3.0  },
                Mars:    { baseInner: 0.9,  maxOuter: 2.5  },
                Jupiter: { baseInner: 2.5,  maxOuter: 12.0 },
                Saturn:  { baseInner: 3.5,  maxOuter: 16.0 },
                Uranus:  { baseInner: 2.5,  maxOuter: 12.0 },
                Neptune: { baseInner: 3.0,  maxOuter: 10.0 },
                Pluto:   { baseInner: 1.8,  maxOuter: 6.0  }
            };
            
            const MOON_RADIUS_EXPONENT = 0.40;  // stronger compression for tiny moons
            const MOON_RADIUS_SCALE    = 0.12;  // base multiplier
            const MOON_RADIUS_REF_KM   = REAL_MOON_RADII.Moon; // reference = Earth's Moon
            const MOON_RADIUS_MIN      = 0.03;  // minimum visual size for tiny bodies
            const MOON_RADIUS_MAX      = 0.22;  // cap so large moons don't dominate
            
            // ── Computation Functions ─────────────────────────────────────
            
            function computePlanetVisualDist(auDist) {
                // Power-law compression: visual = DIST_SCALE * (au / ref)^exponent
                return DIST_SCALE * Math.pow(auDist / DIST_REF_AU, DIST_EXPONENT);
            }
            
            function computePlanetVisualRadius(realRadiusKm) {
                // Power-law compression relative to Earth
                return RADIUS_SCALE * Math.pow(realRadiusKm / RADIUS_REF_KM, RADIUS_EXPONENT);
            }
            
            function computeMoonVisualDist(moonName, hostName) {
                const config = MOON_DIST_CONFIG[hostName];
                if (!config) return 2.0; // fallback
                
                // Find the innermost moon of this host
                const hostMoons = Object.keys(REAL_MOON_SMA).filter(m => {
                    // Match moons to host by checking moonSystemConfig
                    return true; // We'll filter properly below
                });
                
                // Get all moons for this host from the SMA table
                const smaForHost = {};
                for (const [mName, sma] of Object.entries(REAL_MOON_SMA)) {
                    smaForHost[mName] = sma;
                }
                
                const thisSma = REAL_MOON_SMA[moonName];
                if (!thisSma) return config.baseInner; // unknown moon
                
                // Find innermost moon SMA for this host from moonSystemConfig
                let innerMostSma = Infinity;
                let innerMostName = null;
                for (const mc of moonSystemConfig) {
                    if (mc.host === hostName && REAL_MOON_SMA[mc.name]) {
                        if (REAL_MOON_SMA[mc.name] < innerMostSma) {
                            innerMostSma = REAL_MOON_SMA[mc.name];
                            innerMostName = mc.name;
                        }
                    }
                }
                
                if (!innerMostName || innerMostSma === Infinity) return config.baseInner;
                
                // Scale by SMA ratio from innermost moon
                const ratio = thisSma / innerMostSma;
                // Apply mild compression to the ratio for very distant moons
                const compressedRatio = Math.pow(ratio, 0.85);
                let visualDist = config.baseInner * compressedRatio;
                
                // Clamp to maxOuter
                visualDist = Math.min(visualDist, config.maxOuter);
                
                return visualDist;
            }
            
            function computeMoonVisualRadius(realRadiusKm) {
                let r = MOON_RADIUS_SCALE * Math.pow(
                    realRadiusKm / MOON_RADIUS_REF_KM,
                    MOON_RADIUS_EXPONENT
                );
                return Math.max(MOON_RADIUS_MIN, Math.min(MOON_RADIUS_MAX, r));
            }
            
            // ── Apply Scaling ─────────────────────────────────────────────
            // Mutate rawPlanetsData.size and compute visualDist mapping
            
            const planetVisualDists = {};
            const planetVisualRadii = {};
            
            for (const [name, data] of Object.entries(rawPlanetsData)) {
                const auDist = REAL_AU[name] || data.a;
                planetVisualDists[name] = computePlanetVisualDist(auDist);
                planetVisualRadii[name] = computePlanetVisualRadius(REAL_RADII[name] || 6371);
                // Mutate the size in rawPlanetsData for downstream geometry creation
                data.size = planetVisualRadii[name];
            }
            
            // Apply moon scaling and return lookup tables
            const moonVisualDists = {};
            const moonVisualRadii = {};
            
            for (const mc of moonSystemConfig) {
                moonVisualDists[mc.name] = computeMoonVisualDist(mc.name, mc.host);
                moonVisualRadii[mc.name] = computeMoonVisualRadius(
                    REAL_MOON_RADII[mc.name] || 10
                );
                // Mutate the moonSystemConfig entries
                mc.dist = moonVisualDists[mc.name];
                mc.size = moonVisualRadii[mc.name];
            }
            
            return {
                REAL_RADII,
                REAL_AU,
                REAL_MOON_SMA,
                REAL_MOON_RADII,
                SUN_VISUAL_RADIUS,
                planetVisualDists,
                planetVisualRadii,
                moonVisualDists,
                moonVisualRadii,
                computePlanetVisualDist,
                computePlanetVisualRadius,
                computeMoonVisualDist,
                computeMoonVisualRadius
            };
        })();

        // Pre-compute trigonometric values for orbital position calculation
        const planetsData = {};
        for (const [key, el] of Object.entries(rawPlanetsData)) {
            const N_rad = el.node * Math.PI / 180.0;
            const w_rad = (el.w - el.node) * Math.PI / 180.0;
            const i_rad = el.i * Math.PI / 180.0;
            planetsData[key] = {
                ...el,
                cw: Math.cos(w_rad), sw: Math.sin(w_rad),
                cN: Math.cos(N_rad), sN: Math.sin(N_rad),
                ci: Math.cos(i_rad), si: Math.sin(i_rad),
                // Use VisualScaleEngine computed distance instead of order * 6.5
                visualDist: VisualScaleEngine.planetVisualDists[key]
            };
        }

        // ============================================================
        // 4. Moon System Configuration
        // ============================================================
        // p = orbital period in Earth days (negative = retrograde orbit)
        // dist = visual distance from host (scene units, NOT physical)
        // L0 = mean longitude at J2000 epoch (degrees)
        //   - Galilean moons: from Lieske (1998) ephemeris theory
        //   - Saturn moons: from TASS/SAT ephemerides
        //   - Uranian moons: from Laskar & Jacobson
        //   - Earth Moon: from Meeus (L0 = 218.32°)
        //   - Others: approximate values
        // 
        // The Moon (Earth's) is special: it orbits in the ecliptic plane (~5.14° inclination)
        // NOT in Earth's equatorial plane with other moons' offset by host obliquity.
        
        // Moon distances are proportional to real semi-major axes within each system.
        // Each system has a base distance for the innermost moon; others scale by SMA ratio.
        // This ensures correct relative spacing (e.g., Callisto 4.46× farther than Io).
        // Some very distant moons (Titan, Iapetus) are capped to prevent visual overflow.
        const moonSystemConfig = [
            // Earth — Moon orbits near the ecliptic, handled specially
            { name: "Moon", host: "Earth", p: 27.32166, dist: 2.0, size: 0.27, irregular: false, texName: "Moon",
              L0: 218.32, nRate: 13.17639648, inclination: 5.145, node0: 125.04, nodeRate: -0.05295386,
              specialOrbit: "ecliptic" },
            // Mars — Phobos 9376km, Deimos 23460km (ratio 2.50)
            { name: "Phobos", host: "Mars", p: 0.31891, dist: 0.9, size: 0.05, irregular: true, texName: "Phobos", L0: 35.06 },
            { name: "Deimos", host: "Mars", p: 1.26244, dist: 2.25, size: 0.04, irregular: true, texName: "Deimos", L0: 162.0 },
            // Jupiter — Galilean moons (Lieske 1998 L0 at J2000)
            // SMA ratios: Io=1.00, Europa=1.59, Ganymede=2.54, Callisto=4.46
            { name: "Io", host: "Jupiter", p: 1.769138, dist: 2.5, size: 0.13, irregular: false, texName: "Io", L0: 106.07, galilean: true },
            { name: "Europa", host: "Jupiter", p: 3.551181, dist: 3.98, size: 0.11, irregular: false, texName: "Europa", L0: 175.73, galilean: true },
            { name: "Ganymede", host: "Jupiter", p: 7.154553, dist: 6.35, size: 0.18, irregular: false, texName: "Ganymede", L0: 120.56, galilean: true },
            { name: "Callisto", host: "Jupiter", p: 16.68902, dist: 11.16, size: 0.16, irregular: false, texName: "Callisto", L0: 84.44, galilean: true },
            // Saturn — Major moons
            // SMA ratios from Mimas: Enc=1.28, Teth=1.59, Dio=2.03, Rhe=2.84, Tit=6.59, Iap=19.19
            { name: "Mimas", host: "Saturn", p: 0.94242, dist: 3.5, size: 0.08, irregular: false, texName: "Mimas", L0: 14.0 },
            { name: "Enceladus", host: "Saturn", p: 1.37022, dist: 4.49, size: 0.09, irregular: false, texName: "Enceladus", L0: 211.0 },

        // ============================================================
        // 6. Astronomical Position Calculations
        // @DEPRECATED — Will be replaced by OrbitalEngine.computePosition() (Sub-Agent 2)
        // ============================================================
        
        // Compute heliocentric ecliptic position, then map to visual scene coords
        // Scene mapping: x_scene = x_ecliptic, y_scene = z_ecliptic, z_scene = -y_ecliptic
        // This places the ecliptic in the XZ plane with north pole at +Y
        function getOrbitPositionFast(elements, daysSinceJ2000, isRingPoint = false) {
            let M = isRingPoint ? (daysSinceJ2000 * elements.n) : (elements.L - elements.w + elements.n * daysSinceJ2000);
            M = M % 360.0;
            const M_rad = M * Math.PI / 180.0;
            // Newton-Raphson to solve Kepler's equation: E - e*sin(E) = M
            let E = M_rad;
            for(let i=0; i<8; i++) {
                E = E - (E - elements.e * Math.sin(E) - M_rad) / (1.0 - elements.e * Math.cos(E));
            }
            const v = 2 * Math.atan( Math.sqrt((1+elements.e)/(1-elements.e)) * Math.tan(E/2) );
            const r = elements.a * (1 - elements.e * Math.cos(E));
            const x_orb = r * Math.cos(v);
            const y_orb = r * Math.sin(v);
            // Rotate from orbital plane to ecliptic frame
            const x = (elements.cN*elements.cw - elements.sN*elements.sw*elements.ci)*x_orb + (-elements.cN*elements.sw - elements.sN*elements.cw*elements.ci)*y_orb;
            const y = (elements.sN*elements.cw + elements.cN*elements.sw*elements.ci)*x_orb + (-elements.sN*elements.sw + elements.cN*elements.cw*elements.ci)*y_orb;
            const z = (elements.sw*elements.si)*x_orb + (elements.cw*elements.si)*y_orb;
            // Normalize to visual distance (preserves angular position, scales distance)
            return new THREE.Vector3(x, z, -y).normalize().multiplyScalar(elements.visualDist);
        }

        // ============================================================
        // 7. Sun Position Calculations (for Earth rotation alignment)
        // @DEPRECATED — getSunRA/getGMST will be replaced by OrbitalTimeUtils (Sub-Agent 4)
        // ============================================================
        // Meeus low-precision solar position (good to ~1 arcminute)
        function getSunRA(d) {
            const g = ((357.529 + 0.98560028 * d) % 360 + 360) % 360;
            const q = ((280.459 + 0.98564736 * d) % 360 + 360) % 360;
            const g_rad = g * Math.PI / 180;
            const L = q + 1.915 * Math.sin(g_rad) + 0.020 * Math.sin(2 * g_rad);
            const e = 23.439 - 0.00000036 * d;
            const e_rad = e * Math.PI / 180;
            const L_rad = L * Math.PI / 180;
            const RA = Math.atan2(Math.cos(e_rad) * Math.sin(L_rad), Math.cos(L_rad)) * 180 / Math.PI;
            return ((RA % 360) + 360) % 360;
        }

        // GMST in degrees (Meeus / Astronomical Almanac)
        function getGMST(d) {
            return ((280.46061837 + 360.98564736629 * d) % 360 + 360) % 360;
        }

            const matParams = { map: tex[name], roughness: 1.0, metalness: 0.0 };

            const pMat = new THREE.MeshStandardMaterial(matParams);
            const bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 64, 64), pMat);
            bodyMesh.name = name + "_body";
            data.bodyMesh = bodyMesh;
            
            // groupPivot: applies axial tilt & pole orientation
            // For Earth, the tilt is applied specially because we handle rotation via GMST
            let groupPivot = new THREE.Group();
            groupPivot.name = name + "_tilt";
            
            if (name === "Earth") {
                // Earth: tilt around Z by -obliquity, then rotate pole to ecliptic lon ~90°
                // The pole direction in ecliptic coords has longitude ~90°
                const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -data.obliquity * Math.PI / 180.0);
                const qLon = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), 90.0 * Math.PI / 180.0);
                groupPivot.quaternion.multiplyQuaternions(qLon, qTilt);
            } else {
                const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -data.obliquity * Math.PI / 180.0);
                const qLon = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), (data.poleLon || 0.0) * Math.PI / 180.0);
                groupPivot.quaternion.multiplyQuaternions(qLon, qTilt);
            }
            groupPivot.add(bodyMesh);

            // Click hitbox — base geometry at 1× body size.

            // Uses _hit_ prefix so label occlusion raycaster skips it.
            const hitMesh = new THREE.Mesh(

            groupPivot.add(hitMesh);

            // pivot: positioned at orbital location
            const pivot = new THREE.Group();
            pivot.name = name;
            pivot.position.copy(getOrbitPositionFast(data, dInit, false));
            
            // Planetary ring systems
            function createProceduralRingGeometry(inner, outer, maxOpac, ringTint) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 2;
                const ctx = canvas.getContext('2d');
                const g = ctx.createLinearGradient(0,0,256,0);
                g.addColorStop(0, 'rgba(255,255,255,0)');
                g.addColorStop(0.3, `rgba(255,255,255,${maxOpac})`);
                g.addColorStop(0.6, `rgba(255,255,255,${maxOpac*0.5})`);
                g.addColorStop(0.9, `rgba(255,255,255,${maxOpac})`);
                g.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = g;
                ctx.fillRect(0,0,256,2);
                
                const rTex = new THREE.CanvasTexture(canvas);
                const ringGeom = new THREE.RingGeometry(inner, outer, 64);
                const pos = ringGeom.attributes.position;
                const uv = ringGeom.attributes.uv;
                for(let i=0; i<pos.count; i++) {
                    const vec = new THREE.Vector3().fromBufferAttribute(pos,i);
                    uv.setXY(i, (vec.length() - inner)/(outer - inner), 0.5);
                }
                const mat = new THREE.MeshBasicMaterial({color: ringTint, map: rTex, transparent: true, side: THREE.DoubleSide});
                const mesh = new THREE.Mesh(ringGeom, mat);
                // Ring lies in equatorial plane of host — rotate from XY to XZ within tilt group
                mesh.rotation.x = Math.PI / 2; 
                return mesh;
            }

            if (name === "Saturn") {
                // Saturn rings: D ring inner ~1.11 Rs, A ring outer ~2.27 Rs
                // Scale relative to computed planet visual radius (data.size)
                const satRingInner = data.size * 1.23;  // D ring inner ratio
                const satRingOuter = data.size * 2.27;  // A ring outer ratio
                const ringGeom = new THREE.RingGeometry(satRingInner, satRingOuter, 64);
                const pos = ringGeom.attributes.position;
                const uv = ringGeom.attributes.uv;
                for (let i = 0; i < pos.count; i++) {
                    const vec = new THREE.Vector3().fromBufferAttribute(pos, i);
                    uv.setXY(i, (vec.length() - satRingInner) / (satRingOuter - satRingInner), 1.0); 
                }
                const ringMesh = new THREE.Mesh(ringGeom, new THREE.MeshStandardMaterial({
                    map: tLoad.load(urls.SaturnRing), side: THREE.DoubleSide, transparent: true
                }));
                ringMesh.rotation.x = Math.PI / 2; 
                ringMesh.name = "_ring_Saturn";
                groupPivot.add(ringMesh);
            } else if (name === "Uranus") {
                // Uranus epsilon ring at ~1.96 Ru — scale relative to computed radius
                const uRingInner = data.size * 1.50;
                const uRingOuter = data.size * 2.00;
                const uRing = createProceduralRingGeometry(uRingInner, uRingOuter, 0.45, 0xaabbff);
                uRing.name = "_ring_Uranus";
                groupPivot.add(uRing);
            } else if (name === "Neptune") {
                // Neptune Adams ring at ~2.54 Rn — scale relative to computed radius
                const nRingInner = data.size * 1.78;
                const nRingOuter = data.size * 2.67;
                const nRing = createProceduralRingGeometry(nRingInner, nRingOuter, 0.2, 0x88bbcc);
                nRing.name = "_ring_Neptune";
                groupPivot.add(nRing);
            }

            pivot.add(groupPivot);
            pivot.add(createLabel(name, data.size)); 
            scene.add(pivot);
            planets[name] = pivot;
            planetMeshes.push(pivot);

            if (name === "Earth") {
                earthPivot = pivot;
                earthGroupPivot = groupPivot;
            }
        }

        // ============================================================
        // 9. Irregular body geometry (asteroids, small moons)
        // ============================================================
        function createIrregularGeometry(size) {
            const geom = new THREE.IcosahedronGeometry(size, 8); 
            const pos = geom.attributes.position;
            const randSeed = size * 1000.0;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                const noise = (Math.sin(x*4 + randSeed)*Math.cos(y*5)*Math.sin(z*6)) * 0.1;
                const scaleX = 1.0 + (Math.sin(randSeed)*0.2); 
                const scaleY = 1.0 + (Math.cos(randSeed)*0.1);
                const scaleZ = 1.0 - (Math.sin(randSeed*0.5)*0.15); 
                pos.setXYZ(i, (x + x*noise)*scaleX, (y + y*noise)*scaleY, (z + z*noise)*scaleZ);
            }
            geom.computeVertexNormals();
            return geom;
        }

        // ============================================================
        // 10. Moon Construction
        // ============================================================
        const activeMoons = [];
        // Earth's Moon needs special scene-level handling (ecliptic orbit)
        let earthMoonMesh = null;

        for (const mc of moonSystemConfig) {
            const mGeom = mc.irregular ? createIrregularGeometry(mc.size) : new THREE.SphereGeometry(mc.size, 32, 32);
            
            // Use correct texture — Proteus has no texture file, use grey material
            let mMat;
            if (mc.texName === "Proteus") {
                mMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9, metalness: 0.0 });
            } else {
                mMat = new THREE.MeshStandardMaterial({ map: tex[mc.texName], roughness: 0.9, metalness: 0.0 });
            }
            
            const mMesh = new THREE.Mesh(mGeom, mMat);
            mMesh.name = mc.name;
            mMesh.add(createLabel(mc.name, mc.size));
            
            const mHit = new THREE.Mesh(
                new THREE.SphereGeometry(mc.size, 16, 16),
                new THREE.MeshBasicMaterial({visible: false})
            );
            mHit.name = "_hit_" + mc.name;
            mHit.userData.bodyName = mc.name;
            mHit.userData.baseHitRadius = mc.size; // store for dynamic scaling
            mHit.userData.isMoonHit = true;
            mMesh.add(mHit);
            
            if (mc.specialOrbit === "ecliptic") {
                // Earth's Moon: add directly to Earth's pivot (orbital position group),
                // NOT to the groupPivot (tilt group). This way the Moon orbits in
                // scene coordinates (which IS the ecliptic plane), not Earth's equatorial plane.
                earthMoonMesh = mMesh;
                if (earthPivot) {
                    earthPivot.add(mMesh);
                }
            } else if (mc.galilean) {
                // Galilean moons: Lieske longitudes are ECLIPTIC longitudes (Sun-centred,
                // from vernal equinox). Must attach to the un-tilted orbital pivot
                // (planets['Jupiter']), NOT to the obliquity-tilted groupPivot.
                // Coordinate mapping same as Earth Moon: (cos L, 0, -sin L).
                if (planets[mc.host]) {
                    planets[mc.host].add(mMesh);
                } else {
                    scene.add(mMesh);
                }
            } else {
                // All other moons: orbit in their host's equatorial plane (inside groupPivot/tilt group)
                const hostPlanet = planetsData[mc.host];
                if (hostPlanet && hostPlanet.bodyMesh) {
                    hostPlanet.bodyMesh.parent.add(mMesh);
                } else {
                    scene.add(mMesh);
                }
            }
            
            planetMeshes.push(mMesh);
            activeMoons.push({ mesh: mMesh, config: mc });

        // ============================================================

        let viewMode = "GALAXY"; 
        let targetPlanet = sun;
        const lastTargetPos = new THREE.Vector3(0,0,0);

        const statusTxt = document.getElementById('status');

        function flyToBody(clickedPlanet) {
            targetPlanet = clickedPlanet;
            viewMode = "PLANET";
            statusTxt.innerText = targetPlanet.name;
            
            // Sync dropdown to selected body
            const dropdown = document.getElementById("nav-dropdown");
            const opts = dropdown.options;
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].value === targetPlanet.name) {
                    dropdown.selectedIndex = i;
                    break;
                }
            }
            
            const worldPos = new THREE.Vector3();
            targetPlanet.getWorldPosition(worldPos);
            lastTargetPos.copy(worldPos);
            
            const isMoon = moonSystemConfig.find(m => m.name === targetPlanet.name);
            
            if (targetPlanet.name === "Sun") {
                // Restore standard FOV
                camera.fov = 45;
                camera.updateProjectionMatrix();
                // Sun: position camera nearby with slight elevation
                const camDist = 2.5 * 5.0;
                camera.position.set(worldPos.x, worldPos.y + camDist * 0.15, worldPos.z + camDist);
                controls.target.copy(worldPos);
            } else if (isMoon) {
                // === MOON CAMERA v17 — 3-case geometric approach ===
                //
                // Key insight: camera placement depends on whether the planet and Sun
                // are in the SAME or OPPOSITE half-sphere as seen from the moon.
                //
                // Let dotHS = dot(moonToHost, moonToSun):
                //   dotHS ≈ +1: planet+sun nearly same direction (full/opposition moon) → PERPENDICULAR
                //   dotHS ≈ -1: planet+sun opposite (new/conjunction) → bisector degenerate → PERPENDICULAR
                //   dotHS ∈ (0, 0.8]: planet+sun same half-sphere → NEGATIVE BISECTOR (camera outer side)
                //   dotHS ≤ 0:        planet+sun opposite halves → POSITIVE BISECTOR (standard)
                camera.fov = 70;
                camera.updateProjectionMatrix();
                
                const hostPivot = planets[isMoon.host];
                const hostWorldPos = new THREE.Vector3();
                if (hostPivot) hostPivot.getWorldPosition(hostWorldPos);
                
                const hostDist = worldPos.distanceTo(hostWorldPos);
                const hostSize = planetsData[isMoon.host]?.size || 1.0;
                
                // Moon → planet and moon → sun (XZ only, ecliptic plane)
                let moonToHostXZ = new THREE.Vector2(
                    hostWorldPos.x - worldPos.x, hostWorldPos.z - worldPos.z
                );
                if (moonToHostXZ.length() < 0.001) moonToHostXZ.set(1, 0);
                moonToHostXZ.normalize();
                const moonToSunXZ = new THREE.Vector2(-worldPos.x, -worldPos.z).normalize();
                
                // Bisector and geometry
                const bisectorRaw = new THREE.Vector2(
                    moonToHostXZ.x + moonToSunXZ.x, moonToHostXZ.y + moonToSunXZ.y
                );
                const bisectorLen = bisectorRaw.length();
                const dotHS = moonToHostXZ.dot(moonToSunXZ);
                
                // Anti-sun perpendicular (used in CASE 1)
                const planetToMoonXZ = moonToHostXZ.clone().negate();
                const perp1 = new THREE.Vector2(-planetToMoonXZ.y, planetToMoonXZ.x);
                const antiSunPerp = perp1.dot(moonToSunXZ) > 0 ? perp1.clone().negate() : perp1.clone();
                
                const halfFOV_rad = 35.0 * Math.PI / 180.0;
                const angRadius = Math.atan2(hostSize, hostDist);
                const targetAngle = halfFOV_rad + angRadius / 3.0;
                
                let finalDirXZ, camDist;
                
                if (bisectorLen < 0.15 || dotHS > 0.8) {
                    // CASE 1 — PERPENDICULAR
                    // New moon: bisector ≈ 0 (planet+sun antiparallel from moon).
                    // Full moon: dotHS > 0.8, bisector valid but pos-bisector puts camera
                    //            at planet position hiding the Sun behind camera.
                    // Fix: camera perpendicular to planet→moon, anti-Sun bias.
                    // Analytically: planet at targetAngle → camDist = hostDist/tan(targetAngle).
                    finalDirXZ = antiSunPerp.clone();
                    camDist = hostDist / Math.tan(targetAngle);
                    
                } else if (dotHS > 0) {
                    // CASE 2 — NEGATIVE BISECTOR (outer moon)
                    // Planet+sun are in SAME half-sphere from moon (e.g. Callisto at opposition,
                    // Io with Sun+Jupiter both inward). Positive bisector hides Sun behind camera.
                    // Solution: camera on OUTER side (−bisector from moon), looks inward.
                    // Analytically: planet+sun perpendicular components are constant w.r.t. camDist,
                    // and both have depth > 0 for all camDist since we look toward them.
                    // Jupiter appears at most halfAngle=acos(dotHS)/2 off-center (geometric limit).
                    finalDirXZ = bisectorRaw.clone().normalize().negate();
                    camDist = Math.max(isMoon.size * 6.0, hostDist * 0.25);
                    
                } else {
                    // CASE 3 — POSITIVE BISECTOR (standard)
                    // Planet+sun in opposite half-spheres from moon.
                    // Camera along bisector: planet one edge, sun other edge.
                    // Analytically solve camDist so planet center at targetAngle from view axis.
                    finalDirXZ = bisectorRaw.clone().normalize();
                    const cosHalf = moonToHostXZ.dot(finalDirXZ);
                    const halfAngle = Math.acos(Math.max(-1, Math.min(1, cosHalf)));
                    camDist = hostDist * Math.cos(halfAngle)
                            + hostDist * Math.sin(halfAngle) / Math.tan(targetAngle);
                }
                
                camDist = Math.max(camDist, isMoon.size * 4.0);
                camDist = Math.max(camDist, hostDist * 0.15);
                
                camera.position.set(
                    worldPos.x + finalDirXZ.x * camDist,
                    camDist * 0.02,
                    worldPos.z + finalDirXZ.y * camDist
                );
                controls.target.copy(worldPos);
            } else {
                // === PLANET SELECTED ===
                // Restore standard FOV
                camera.fov = 45;
                camera.updateProjectionMatrix();
                // Position camera on the opposite side from the Sun,
                // so the Sun is directly behind the planet from camera's view.
                // Zoom out far enough to see the outermost moon.
                const bodySize = planetsData[targetPlanet.name].size;
                
                // Direction from Sun to planet
                const sunToBody = worldPos.clone().normalize();
                
                // Find the outermost moon's distance for this planet
                let maxMoonDist = 0;
                for (const mc of moonSystemConfig) {
                    if (mc.host === targetPlanet.name) {
                        maxMoonDist = Math.max(maxMoonDist, mc.dist);
                    }
                }
                // Camera distance: enough to see outermost moon + some margin
                // If no moons, use 4x body size
                let camDist = maxMoonDist > 0 ? maxMoonDist * 1.5 : bodySize * 5.0;
                camDist = Math.max(camDist, bodySize * 4.0); // minimum zoom
                
                // Place camera along the Sun-to-planet direction, past the planet
                camera.position.copy(worldPos).add(sunToBody.clone().multiplyScalar(camDist));
                camera.position.y += camDist * 0.15; // slight elevation for 3D perspective
                controls.target.copy(worldPos);
            }
            
            const hud = document.getElementById("hud-telemetry");
            if (planetsData[targetPlanet.name]) {
                const daysRaw = Math.abs(planetsData[targetPlanet.name].period * 365.25);
                const dHours = Math.abs(planetsData[targetPlanet.name].rotPeriod * 24.0).toFixed(1);
                let orbitText = `${daysRaw.toFixed(1)} EARTH DAYS`;
                if (daysRaw > 365.25) {
                    const years = Math.floor(daysRaw / 365.25);
                    const days = Math.floor(daysRaw % 365.25);
                    orbitText = `${years} EARTH YEARS AND ${days} EARTH DAYS`;
                }
                hud.innerHTML = `YEAR LENGTH: ${orbitText}<br>DAY: ${dHours} HOURS`;
            } else if (isMoon) {
                const paramsAbs = Math.abs(isMoon.p);
                const mHours = (paramsAbs * 24.0).toFixed(1);
                let orbitText = `${paramsAbs.toFixed(1)} EARTH DAYS`;
                if (paramsAbs > 365.25) {
                    const years = Math.floor(paramsAbs / 365.25);
                    const days = Math.floor(paramsAbs % 365.25);
                    orbitText = `${years} EARTH YEARS AND ${days} EARTH DAYS`;
                }
                hud.innerHTML = `ORBIT TIME AROUND ${isMoon.host.toUpperCase()}: ${orbitText}<br>DAY: ${mHours} HOURS`;
            } else {
                hud.innerHTML = `YEAR LENGTH: CORE<br>DAY: 648 HOURS`;
            }
            hud.style.display = "block";
        }

        window.addEventListener('pointerup', (event) => {
            const deltaX = Math.abs(event.clientX - pointerDownX);
            const deltaY = Math.abs(event.clientY - pointerDownY);
            if (deltaX > 5 || deltaY > 5) return;
            
            let clickedPlanet = null;
            
            if (event.target.classList.contains('planet-label')) {
                const bName = event.target.dataset.bodyName;
                if (bName === "Sun") clickedPlanet = sun;
                else if (planets[bName]) clickedPlanet = planets[bName];
                else clickedPlanet = activeMoons.find(m => m.config.name === bName)?.mesh;
            } else if (event.target.tagName === 'CANVAS') {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(planetMeshes, true);
                if (intersects.length > 0) {
                    let moonHit = null;
                    let planetHit = null;
                    for (let intx of intersects) {
                        let current = intx.object;
                        let bodyName = null;
                        while(current) {
                            // Check for hitbox userData first (hitboxes have _hit_ prefix in name)
                            if (current.userData && current.userData.bodyName) {
                                bodyName = current.userData.bodyName;
                                break;
                            }
                            if (planets[current.name] || sun.name === current.name || activeMoons.find(m => m.config.name === current.name)) {
                                bodyName = current.name;
                                break;
                            }
                            current = current.parent;
                        }
                        if (bodyName) {
                            if (activeMoons.find(m => m.config.name === bodyName)) {
                                if (!moonHit) moonHit = activeMoons.find(m => m.config.name === bodyName).mesh;
                            } else if (!planetHit) {
                                if (bodyName === "Sun") planetHit = sun;
                                else planetHit = planets[bodyName];
                            }
                        }
                    }
                    // Distance-based priority: in galaxy view (camera far from any planet),
                    // prefer planets over moons to prevent moon hitboxes stealing clicks
                    if (moonHit && planetHit) {
                        const moonConfig = moonSystemConfig.find(m => m.name === moonHit.name);
                        if (moonConfig && moonConfig.host === planetHit.name) {
                            // Moon belongs to this planet — check if camera is far away
                            const planetWorld = new THREE.Vector3();
                            planetHit.getWorldPosition(planetWorld);
                            const camDistToPlanet = camera.position.distanceTo(planetWorld);
                            const bodySize = planetsData[planetHit.name]?.size || 1.0;
                            // If camera is more than 20x body size away, prefer the planet
                            if (camDistToPlanet > bodySize * 20.0) {
                                moonHit = null;
                            }
                        }
                    }
                    clickedPlanet = moonHit ? moonHit : planetHit;
                }
            }
            
            if (clickedPlanet) flyToBody(clickedPlanet);
        });

        // Navigation dropdown
        const buildNavDropdown = () => {
            const dropdown = document.getElementById("nav-dropdown");
            let ht = `<option value="none" disabled selected>Jump to Body...</option>`;
            ht += `<option value="Sun">Sun</option>`;
            const pKeys = Object.keys(planetsData).sort((a,b) => planetsData[a].order - planetsData[b].order);
            for(const p of pKeys) {
                ht += `<option value="${p}">${p}</option>`;
                const hMoons = moonSystemConfig.filter(m => m.host === p).sort((a,b) => a.dist - b.dist);
                for(const m of hMoons) {
                    ht += `<option value="${m.name}">&nbsp;&nbsp;&nbsp;${m.name}</option>`;
                }
            }
            dropdown.innerHTML = ht;
            dropdown.addEventListener('change', (e) => {
                const tName = e.target.value;
                let cObj = null;
                if (tName === "Sun") cObj = sun;
                else if (planets[tName]) cObj = planets[tName];
                else cObj = activeMoons.find(m => m.config.name === tName)?.mesh;
                if (cObj) flyToBody(cObj);
                e.target.blur();
            });
        };
        buildNavDropdown();

        // Shared function for calculating the correct galaxy zoom level
        // Dynamically adapts to screen resolution, size and aspect ratio
        function calcResetView() {
            camera.fov = 45;
            camera.updateProjectionMatrix();
            let maxDist = 0;
            for(const [pName, pData] of Object.entries(planetsData)) {
                if(pData.visualDist > maxDist && pName !== "Pluto") maxDist = pData.visualDist;
            }
            if(plutoEnabled) maxDist = planetsData["Pluto"].visualDist;
            const distRadius = maxDist * 1.1; 
            const vFOV = (Math.PI / 180.0) * camera.fov;
            const hFOV = 2 * Math.atan(Math.tan(vFOV / 2) * camera.aspect);
            const activeFOV = (camera.aspect < 1.0) ? hFOV : vFOV;
            const requiredDist = (distRadius * 1.1) / Math.tan(activeFOV / 2);
            camera.position.set(0, requiredDist, 0);
            controls.target.set(0,0,0);
            viewMode = "GALAXY";
            targetPlanet = null;
        }

        // Set initial camera to the same dynamic zoom as reset view
        calcResetView();
        statusTxt.innerText = "Solar System";
        document.getElementById("hud-telemetry").style.display = "none";
        document.getElementById("nav-dropdown").selectedIndex = 0;

        document.getElementById("reset-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            calcResetView();
            statusTxt.innerText = "Solar System";
            document.getElementById("hud-telemetry").style.display = "none";
            // Reset dropdown to default
            document.getElementById("nav-dropdown").selectedIndex = 0;
        });

        // ============================================================
        // 12. Animation Loop
        // ============================================================
        let frameCount = 0;
        const visibilityRaycaster = new THREE.Raycaster();

        function animate() {
            requestAnimationFrame(animate);
            frameCount++;
            // Time query routed through offline OrbitalTimeUtils
            const dNow = getCurrentJ2000Days();

            // Update planet positions and rotations
            // Planet positions and rotations — all routed through offline OrbitalEngine
            for (const [key, data] of Object.entries(planetsData)) {
                planets[key].position.copy(getOrbitPositionFast(data, dNow, false));
                data.bodyMesh.rotation.y = computeBodyRotation(data, dNow);
            }

            // Sun rotation — routed through offline OrbitalEngine
            sun.rotation.y = computeSunRotation(dNow);
            
            // Moon positions — all routed through offline OrbitalEngine
            for (const mc of activeMoons) {
                if (planets[mc.config.host] || mc.config.specialOrbit === "ecliptic") {
                    const pos = computeMoonPosition(mc.config, dNow);
                    mc.mesh.position.set(pos.x, pos.y, pos.z);
                }
            }
            
            // Dynamic hitbox scaling — scale hitbox mesh based on camera distance.
            // At galaxy view (far), hitboxes are larger (2.5×) for easy tapping.
            // At planet close-up (near), hitboxes shrink to 1.0× to prevent overlap.
            // Throttled to every 3 frames for performance.
            if (frameCount % 3 === 0) {
                const camOriginDist = camera.position.length(); // distance from origin
                // Interpolation: at distance > 60, scale = 2.5; at distance < 8, scale = 1.0
                const farDist = 60.0;
                const nearDist = 8.0;
                const farScale = 2.5;
                const nearScale = 1.0;
                const t = Math.max(0, Math.min(1, (camOriginDist - nearDist) / (farDist - nearDist)));
                const hitScale = nearScale + t * (farScale - nearScale);
                
                for (const mesh of planetMeshes) {
                    // Traverse children to find hitbox meshes
                    mesh.traverse((child) => {
                        if (child.userData && child.userData.baseHitRadius) {
                            let scale = hitScale;
                            // Cap planet hitboxes to not exceed nearest moon orbit
                            if (child.userData.isPlanetHit) {
                                const pName = child.userData.bodyName;
                                const moons = moonSystemConfig.filter(m => m.host === pName);
                                if (moons.length > 0) {
                                    const nearestMoonDist = Math.min(...moons.map(m => m.dist));
                                    const maxRadius = nearestMoonDist * 0.8;
                                    const scaledRadius = child.userData.baseHitRadius * scale;
                                    if (scaledRadius > maxRadius) {
                                        scale = maxRadius / child.userData.baseHitRadius;
                                    }
                                }
                            }
                            child.scale.set(scale, scale, scale);
                        }
                    });
                }
            }
            
            // Camera follow
            if (viewMode === "PLANET" && targetPlanet) {
                const worldPos = new THREE.Vector3();
                targetPlanet.getWorldPosition(worldPos);
                const deltaMovement = new THREE.Vector3().subVectors(worldPos, lastTargetPos);
                camera.position.add(deltaMovement);
                controls.target.add(deltaMovement);
                lastTargetPos.copy(worldPos);
            }

            controls.update();
            renderer.render(scene, camera);
            
            // Throttled Label Occlusion (every 5 frames)
            if (frameCount % 5 === 0) {
                const cameraPos = camera.position;
                for (let i = 0; i < labelsList.length; i++) {
                    const lblDiv = labelsList[i];
                    const objName = lblDiv.dataset.bodyName;
                    
                    let targetMesh = null;
                    if (objName === "Sun") targetMesh = sun;
                    else if (planets[objName]) targetMesh = planets[objName];
                    else targetMesh = activeMoons.find(m => m.config.name === objName)?.mesh;
                    
                    if (!targetMesh) continue;
                    
                    const moonConfig = moonSystemConfig.find(m => m.name === objName);
                    
                    if (!plutoEnabled && (objName === "Pluto" || (moonConfig && moonConfig.host === "Pluto"))) {
                        lblDiv.classList.add('hidden-label');
                        continue;
                    }
                    
                    let isEclipsed = false;
                    const worldPos = new THREE.Vector3();
                    targetMesh.getWorldPosition(worldPos);
                    const targetDist = cameraPos.distanceTo(worldPos);
                    const rayDir = worldPos.clone().sub(cameraPos).normalize();
                    visibilityRaycaster.set(cameraPos, rayDir);
                    const intersects = visibilityRaycaster.intersectObjects(planetMeshes, true);
                    
                    for(let intx of intersects) {
                        if (intx.distance >= targetDist - 0.5) break;
                        // Skip hitbox meshes (named _hit_*) and ring meshes (named _ring_*)
                        // Only actual body meshes count as occluders
                        const hitName = intx.object.name || "";
                        if (hitName.startsWith("_hit_") || hitName.startsWith("_ring_") || hitName === "") continue;
                        if (hitName !== objName && hitName !== objName + "_body") {
                            isEclipsed = true; 
                            break;
                        }
                    }
                    
                    if (planetsData[objName] || objName === "Sun") {
                        if (isEclipsed) lblDiv.classList.add('hidden-label');
                        else lblDiv.classList.remove('hidden-label');
                    } else if (moonConfig) {
                        const hostWorld = new THREE.Vector3();
                        if(planets[moonConfig.host]) planets[moonConfig.host].getWorldPosition(hostWorld);
                        const hostDist = cameraPos.distanceTo(hostWorld);
                        const hideThreshold = planetsData[moonConfig.host].size * 45.0;
                        if (hostDist > hideThreshold) {
                            lblDiv.classList.add('hidden-label');
                        } else {
                            if (isEclipsed) lblDiv.classList.add('hidden-label');
                            else lblDiv.classList.remove('hidden-label');
                        }
                    }
                }
            }
            
            labelRenderer.render(scene, camera); 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
